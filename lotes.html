<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDA 2026 — Dashboard de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card2: #0f172a;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #475569;
  --white: #f8fafc;
  --green: #10b981;
  --yellow: #f59e0b;
  --indigo: #6366f1;
  --pink: #ec4899;
  --red: #ef4444;
  --orange: #f97316;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.container { max-width: 960px; margin: 0 auto; }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--card), var(--bg));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}
.header-top {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.header h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: var(--white);
}
.header .subtitle {
  color: var(--muted);
  font-size: 12px;
  margin-top: 4px;
}
.kpis { display: flex; gap: 10px; flex-wrap: wrap; }
.kpi {
  background: var(--card);
  border-radius: 10px;
  padding: 8px 14px;
  text-align: center;
  min-width: 80px;
}
.kpi-val { font-size: 18px; font-weight: 800; margin: 0; font-family: 'Barlow Condensed', sans-serif; }
.kpi-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── BARRA DE PROGRESSO ── */
.progress-wrap { margin-top: 16px; }
.progress-bar { background: var(--card); border-radius: 99px; height: 10px; }
.progress-fill {
  background: linear-gradient(90deg, var(--indigo), var(--pink));
  border-radius: 99px; height: 10px;
  transition: width 0.6s ease;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
}

/* ── TABS ── */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  background: var(--card);
  color: #94a3b8;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Barlow', sans-serif;
  transition: all 0.2s;
}
.tab-btn.active { background: var(--indigo); color: #fff; }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 16px;
}
.card-title {
  font-weight: 800;
  font-size: 14px;
  font-family: 'Barlow Condensed', sans-serif;
  color: var(--white);
  margin-bottom: 4px;
}
.card-sub { color: var(--muted); font-size: 11px; margin-bottom: 16px; }

/* ── GRID 2 COLS ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── COMPARATIVO ── */
.comp-box {
  background: var(--card2);
  border-radius: 10px;
  padding: 16px;
}
.comp-ano { font-weight: 800; font-size: 13px; margin-bottom: 8px; font-family: 'Barlow Condensed', sans-serif; }
.comp-qtd { font-size: 24px; font-weight: 800; color: var(--white); }
.comp-sub { font-size: 11px; color: var(--muted); }
.comp-receita { font-size: 13px; font-weight: 700; color: var(--green); margin-top: 6px; }

.diff-box {
  background: var(--card2);
  border-radius: 10px;
  padding: 14px;
  margin-top: 12px;
}
.diff-box p { font-size: 12px; color: #94a3b8; line-height: 1.6; }

/* ── LOTES ── */
.lote-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  padding: 8px 12px;
  background: var(--card2);
  border-radius: 8px;
}
.lote-nome { font-size: 11px; font-weight: 700; color: var(--text); }
.lote-periodo { font-size: 10px; color: var(--muted2); margin-top: 2px; }
.lote-qtd { font-weight: 800; font-size: 14px; }
.lote-previsto { opacity: 0.6; }
.lote-previsto .lote-nome { color: var(--muted); }

/* ── MIX CATEGORIAS ── */
.mix-cat-name { font-size: 11px; font-weight: 700; }
.mix-pct { font-size: 11px; color: #94a3b8; }
.mix-bar { background: var(--border); border-radius: 99px; height: 6px; margin-top: 4px; }
.mix-fill { border-radius: 99px; height: 6px; transition: width 0.5s ease; }

/* ── CALENDÁRIO ── */
.fech-item {
  display: flex;
  gap: 12px;
  align-items: center;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  transition: opacity 0.3s;
}
.fech-tag {
  font-size: 10px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 6px;
}
.fech-tier { font-size: 11px; font-weight: 700; color: var(--text); }
.fech-data { font-size: 13px; font-weight: 800; color: var(--white); margin-top: 4px; }
.fech-status {
  font-size: 10px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  margin-left: auto;
}

/* ── AÇÕES IMEDIATAS ── */
.acao-item {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
  background: var(--card2);
  border-radius: 8px;
  padding: 10px 14px;
}
.acao-tag {
  font-size: 10px;
  font-weight: 800;
  white-space: nowrap;
  padding: 2px 8px;
  border-radius: 6px;
  align-self: flex-start;
}
.acao-text { font-size: 12px; color: #cbd5e1; line-height: 1.5; }

/* ── SEMANAS ── */
.sem-item {
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
}
.sem-top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.sem-label { font-size: 10px; font-weight: 800; }
.sem-lote { font-size: 11px; color: var(--muted2); margin: 2px 0; }
.sem-nums { text-align: right; }
.sem-val { font-size: 13px; font-weight: 800; color: var(--white); }
.sem-acum { font-size: 11px; color: var(--muted); margin: 2px 0; }
.sem-bar { background: var(--card); border-radius: 99px; height: 4px; margin-top: 8px; }
.sem-fill { border-radius: 99px; height: 4px; transition: width 0.5s ease; }

/* ── ANÁLISES ── */
.analise-box {
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
}
.analise-titulo { font-weight: 800; font-size: 13px; margin-bottom: 12px; font-family: 'Barlow Condensed', sans-serif; }
.analise-item {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.analise-num { font-weight: 800; min-width: 18px; font-size: 12px; }
.analise-text { color: #cbd5e1; font-size: 12px; line-height: 1.6; }

/* ── LOADING ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  font-size: 14px;
  color: var(--muted);
}
.loading-spinner {
  width: 24px; height: 24px;
  border: 3px solid var(--border);
  border-top-color: var(--indigo);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .grid-2 { grid-template-columns: 1fr; }
  .kpis { flex-wrap: wrap; }
  .kpi { flex: 1; min-width: 70px; }
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    Carregando dados do dashboard...
  </div>
</div>

<script>
var JSON_URL = 'https://raw.githubusercontent.com/petterson-bot/sda2026-tv/main/dados-dashboard.json';
var REFRESH_MS = 60000;
var currentTab = 0;
var TAB_NAMES = ['📊 Comparativo', '🗓 Calendário', '🎯 Meta & Semanas', '✅ Acertos e Ajustes'];

function fmt(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function setTab(n) {
  currentTab = n;
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === n);
  });
  document.querySelectorAll('.panel').forEach(function(p, i) {
    p.classList.toggle('active', i === n);
  });
}

function render(d) {
  var r = d.resumo;
  var app = document.getElementById('app');

  var html = '';

  // ══════════════════════════════════════
  //  HEADER
  // ══════════════════════════════════════
  html += '<div class="header">';
  html += '<div class="header-top"><div>';
  html += '<h1>🎭 SDA 2026 — Dashboard de Vendas</h1>';
  html += '<p class="subtitle">Atualizado em ' + d.ts + ' · Evento: 24–26/04/2026 · Encerramento vendas: 22/04</p>';
  html += '</div><div class="kpis">';

  var kpis = [
    { label: 'Vendidos',       val: r.vendidos2026,  cor: '#10b981' },
    { label: 'Faltam',         val: r.faltam,        cor: '#f59e0b' },
    { label: 'Meta',           val: r.meta,          cor: '#6366f1' },
    { label: 'Dias restantes', val: r.diasRestantes, cor: '#ec4899' }
  ];
  kpis.forEach(function(k) {
    html += '<div class="kpi"><p class="kpi-val" style="color:' + k.cor + '">' + k.val + '</p>';
    html += '<p class="kpi-label">' + k.label + '</p></div>';
  });
  html += '</div></div>';

  // Barra de progresso
  html += '<div class="progress-wrap"><div class="progress-bar">';
  html += '<div class="progress-fill" style="width:' + r.pct + '%"></div></div>';
  html += '<div class="progress-info"><span>' + r.pct + '% da meta atingida</span>';
  html += '<span style="color:#f59e0b">Média necessária: ' + r.mediaDia + ' ingressos/dia nos próximos ' + r.diasRestantes + ' dias</span>';
  html += '</div></div></div>';

  // ══════════════════════════════════════
  //  TABS
  // ══════════════════════════════════════
  html += '<div class="tabs">';
  TAB_NAMES.forEach(function(t, i) {
    html += '<button class="tab-btn' + (i === currentTab ? ' active' : '') + '" onclick="setTab(' + i + ')">' + t + '</button>';
  });
  html += '</div>';

  // ══════════════════════════════════════
  //  TAB 0 — COMPARATIVO
  // ══════════════════════════════════════
  html += '<div class="panel' + (currentTab === 0 ? ' active' : '') + '">';

  // Corte comparativo
  html += '<div class="card"><p class="card-title">📍 Comparativo no mesmo ponto do ciclo</p>';
  html += '<p class="card-sub">SDA 2025 (total acumulado) · SDA 2026 corte em ' + d.corte2026.data + ' (' + d.corte2026.dias_antes + ' dias antes)</p>';
  html += '<div class="grid-2">';

  var comps = [
    { ano: 'SDA 2025', qtd: d.corte2025.qtd, rec: d.corte2025.receita, data: d.corte2025.data, cor: '#6366f1' },
    { ano: 'SDA 2026', qtd: d.corte2026.qtd, rec: d.corte2026.receita, data: d.corte2026.data, cor: '#10b981' }
  ];
  comps.forEach(function(a) {
    html += '<div class="comp-box" style="border:1px solid ' + a.cor + '33">';
    html += '<p class="comp-ano" style="color:' + a.cor + '">' + a.ano + '</p>';
    html += '<p class="comp-qtd">' + a.qtd + '</p>';
    html += '<p class="comp-sub">ingressos · ' + a.data + '</p>';
    html += '<p class="comp-receita">' + fmt(a.rec) + '</p></div>';
  });
  html += '</div>';

  // Diferença
  var diff = d.corte2026.qtd - d.corte2025.qtd;
  var diffPct = d.corte2025.qtd > 0 ? ((diff / d.corte2025.qtd) * 100).toFixed(1) : 0;
  html += '<div class="diff-box"><p>';
  html += '<span style="color:#f59e0b;font-weight:700">Diferença: </span>';
  html += 'SDA 2026 está com <strong style="color:' + (diff >= 0 ? '#10b981' : '#ef4444') + '">' + (diff >= 0 ? '+' : '') + diff + ' ingressos (' + (diff >= 0 ? '+' : '') + diffPct + '%)</strong> vs 2025 — ';
  html += 'receita ' + fmt(d.corte2026.receita) + ' vs ' + fmt(d.corte2025.receita) + '.';
  html += '</p></div></div>';

  // Lotes lado a lado
  html += '<div class="grid-2" style="margin-bottom:16px">';

  // SDA 2025
  var total25 = d.lotes2025.reduce(function(a,l){ return a + l.qtd; }, 0);
  html += '<div class="card"><p class="card-title" style="color:#6366f1;font-size:13px">SDA 2025 — Por Fase (total: ' + total25 + ')</p>';
  d.lotes2025.forEach(function(l) {
    html += '<div class="lote-item" style="border-left:3px solid ' + l.cor + '">';
    html += '<div><p class="lote-nome">' + l.fase + '</p><p class="lote-periodo">' + l.periodo + '</p></div>';
    html += '<span class="lote-qtd" style="color:' + l.cor + '">' + l.qtd + '</span></div>';
  });
  html += '</div>';

  // SDA 2026
  html += '<div class="card"><p class="card-title" style="color:#10b981;font-size:13px">SDA 2026 — Por Fase (vendidos: ' + r.vendidos2026 + ')</p>';
  d.lotes2026.forEach(function(l) {
    var cls = l.encerrado ? '' : ' lote-previsto';
    html += '<div class="lote-item' + cls + '" style="border-left:3px solid ' + l.cor + '">';
    html += '<div><p class="lote-nome">' + l.fase + (l.encerrado ? '' : ' (previsto)') + '</p>';
    html += '<p class="lote-periodo">' + l.periodo + '</p></div>';
    var val = (l.qtd !== null && l.qtd > 0) ? l.qtd : (l.meta ? '~' + l.meta : '—');
    html += '<span class="lote-qtd" style="color:' + l.cor + '">' + val + '</span></div>';
  });
  html += '</div></div>';

  // Mix categorias
  html += '<div class="card"><p class="card-title">Mix por Categoria — Comparativo</p>';
  html += '<div class="grid-2">';
  var mixes = [
    { ano: 'SDA 2025', data: d.mix2025, cor: '#6366f1' },
    { ano: 'SDA 2026 (atual)', data: d.mix2026, cor: '#10b981' }
  ];
  mixes.forEach(function(m) {
    html += '<div><p style="color:' + m.cor + ';font-weight:700;font-size:12px;margin-bottom:10px">' + m.ano + '</p>';
    m.data.forEach(function(c) {
      html += '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">';
      html += '<span class="mix-cat-name" style="color:' + c.cor + '">' + c.cat + '</span>';
      html += '<span class="mix-pct">' + c.pct + '%</span></div>';
      html += '<div class="mix-bar"><div class="mix-fill" style="background:' + c.cor + ';width:' + c.pct + '%"></div></div></div>';
    });
    html += '</div>';
  });
  html += '</div></div>';

  html += '</div>'; // fim panel 0

  // ══════════════════════════════════════
  //  TAB 1 — CALENDÁRIO
  // ══════════════════════════════════════
  html += '<div class="panel' + (currentTab === 1 ? ' active' : '') + '">';

  html += '<div class="card"><p class="card-title">📅 Calendário de Fechamentos por Tier</p>';
  html += '<p class="card-sub">Vendas encerram 2 dias antes do evento · Encerramento geral: 22/04 às 23h59</p>';

  d.fechamentos.forEach(function(f) {
    var statusColor = f.status === 'ENCERRADO' ? '#64748b' : f.status === 'ATIVO' ? '#10b981' : '#f59e0b';
    var bg = f.status === 'ENCERRADO' ? '#0f1f14' : f.status === 'ATIVO' ? '#0f2d1a' : '#1e293b';
    var op = f.status === 'ENCERRADO' ? '0.6' : '1';
    html += '<div class="fech-item" style="background:' + bg + ';border-left:3px solid ' + f.cor + ';opacity:' + op + '">';
    html += '<div style="flex:1"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
    html += '<span class="fech-tag" style="color:' + f.cor + ';background:' + f.cor + '22">' + f.lote + '</span>';
    html += '<span class="fech-tier">' + f.tier + '</span></div>';
    html += '<p class="fech-data">📆 ' + f.data + '</p></div>';
    html += '<span class="fech-status" style="color:' + statusColor + ';background:' + statusColor + '22">' + f.status + '</span></div>';
  });
  html += '</div>';

  // Ações imediatas
  html += '<div class="card"><p class="card-title" style="color:#f59e0b">⚡ Próximas ações imediatas</p>';
  var acoes = [
    { urgencia: 'HOJE',         acao: '3º Lote abriu às 22h00 de 05/03 — comunicação de lançamento em todos os canais',                            cor: '#6366f1' },
    { urgencia: 'ATÉ 10/03',    acao: 'Fechamento PLATINUM do 3º Lote às 21h59 — urgência máxima para tier premium',                                cor: '#a78bfa' },
    { urgencia: 'ATÉ 12/03',    acao: 'Fechamento VIP do 3º Lote às 21h59 — upsell Experience→VIP nas 48h anteriores',                              cor: '#60a5fa' },
    { urgencia: '16/03 07h59',   acao: 'Reabertura relâmpago Platinum + VIP — demanda represada, comunicar com antecedência',                        cor: '#8b5cf6' },
    { urgencia: '16/03 21h59',   acao: 'Fechamento Experience + 3º Lote geral — encerramento total do 3º lote',                                     cor: '#34d399' }
  ];
  acoes.forEach(function(a) {
    html += '<div class="acao-item" style="border-left:3px solid ' + a.cor + '">';
    html += '<span class="acao-tag" style="color:' + a.cor + ';background:' + a.cor + '22">' + a.urgencia + '</span>';
    html += '<p class="acao-text">' + a.acao + '</p></div>';
  });
  html += '</div></div>'; // fim panel 1

  // ══════════════════════════════════════
  //  TAB 2 — META & SEMANAS
  // ══════════════════════════════════════
  html += '<div class="panel' + (currentTab === 2 ? ' active' : '') + '">';

  html += '<div class="card"><p class="card-title">🗓 Meta Semanal — Caminho até ' + r.meta + '</p>';
  html += '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  var metaCards = [
    { label: 'Acum. atual', val: r.vendidos2026, cor: '#10b981' },
    { label: 'Meta março',  val: 644,             cor: '#6366f1' },
    { label: 'Meta abril',  val: 1271,            cor: '#ec4899' },
    { label: 'Faltam',      val: r.faltam,        cor: '#f59e0b' }
  ];
  metaCards.forEach(function(k) {
    html += '<div style="background:#0f172a;border-radius:8px;padding:8px 14px;flex:1;min-width:80px;text-align:center">';
    html += '<p style="font-size:16px;font-weight:800;color:' + k.cor + ';margin:0;font-family:Barlow Condensed">' + k.val + '</p>';
    html += '<p style="font-size:10px;color:#64748b;margin-top:2px">' + k.label + '</p></div>';
  });
  html += '</div>';

  // Semanas
  d.semanas.forEach(function(s) {
    var pct = (s.real !== null && s.meta > 0) ? Math.min(Math.round((s.real / s.meta) * 100), 100) : 0;
    var bg = s.enc ? '#0a1a0f' : (s.ativo ? '#0f2d1a' : '#0f172a');
    var borderC = s.enc ? '#10b981' : s.cor;

    html += '<div class="sem-item" style="background:' + bg + ';border-left:4px solid ' + borderC + '">';
    html += '<div class="sem-top"><div>';
    html += '<span class="sem-label" style="color:' + (s.enc ? '#10b981' : s.cor) + '">S' + s.n + ' — ' + s.s + (s.enc ? ' ✓' : '') + (s.ativo ? ' ← ATIVA' : '') + '</span>';
    html += '<p class="sem-lote">' + s.lote + '</p></div>';
    html += '<div class="sem-nums"><p class="sem-val">';
    if (s.real !== null) html += s.real + ' / ';
    html += '<span style="color:' + s.cor + '">+' + s.meta + '</span></p>';
    html += '<p class="sem-acum">acum. ' + s.acum + '</p></div></div>';

    if (s.real !== null) {
      html += '<div class="sem-bar"><div class="sem-fill" style="background:' + (pct >= 100 ? '#10b981' : s.cor) + ';width:' + pct + '%"></div></div>';
    }
    html += '</div>';
  });
  html += '</div></div>'; // fim panel 2

  // ══════════════════════════════════════
  //  TAB 3 — ACERTOS E AJUSTES
  // ══════════════════════════════════════
  html += '<div class="panel' + (currentTab === 3 ? ' active' : '') + '">';

  var secoes = [
    { tipo: '✅ O que está indo bem',            cor: '#10b981', bg: '#0a2a1a', items: d.analises.acertos },
    { tipo: '⚠️ Pontos de atenção',              cor: '#f59e0b', bg: '#2a1a00', items: d.analises.atencao },
    { tipo: '🎯 Ações recomendadas agora',       cor: '#6366f1', bg: '#0a0a2a', items: d.analises.acoes },
    { tipo: '📊 Projeção vs 2025 (lotes restantes)', cor: '#ec4899', bg: '#2a0a1a', items: d.analises.projecao }
  ];

  secoes.forEach(function(sec) {
    html += '<div class="analise-box" style="background:' + sec.bg + ';border:1px solid ' + sec.cor + '33">';
    html += '<p class="analise-titulo" style="color:' + sec.cor + '">' + sec.tipo + '</p>';
    sec.items.forEach(function(item, j) {
      html += '<div class="analise-item">';
      html += '<span class="analise-num" style="color:' + sec.cor + '">' + (j + 1) + '.</span>';
      html += '<p class="analise-text">' + item + '</p></div>';
    });
    html += '</div>';
  });
  html += '</div>'; // fim panel 3

  app.innerHTML = html;
}

function buscar() {
  document.getElementById('loading') && (document.getElementById('loading').style.display = 'flex');
  fetch(JSON_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      render(d);
    })
    .catch(function(e) {
      var app = document.getElementById('app');
      app.innerHTML = '<div class="loading" style="color:#ef4444">Erro ao carregar: ' + e.message + '<br>Tentando novamente em 60s...</div>';
    });
}

buscar();
setInterval(buscar, REFRESH_MS);
</script>
</body>
</html>
